# docker-compose.yml
# This runs your app with a single command: docker-compose up
# It manages the app container + any other services together

version: "3.8"

services:
  rag-api:
    build: .                          # Build from our Dockerfile
    container_name: rag-platform
    ports:
      - "8000:8000"                   # Your computer's port 8000 → container's port 8000
    env_file:
      - .env                          # Load your OPENAI_API_KEY from .env file
    volumes:
      - ./chroma_db:/app/chroma_db    # Save ChromaDB data on your computer (not lost when container stops)
      - .:/app                        # Live reload: code changes reflect immediately
    restart: unless-stopped
